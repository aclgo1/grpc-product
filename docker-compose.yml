version: "3.9"

services:
  app:
    build: . 
    ports:
      - 50054:50054
    restart: always
  db:
    image: postgres:15.2-alpine3.17
    container_name: db
    environment: 
      POSTGRES_PASSWORD: grpc-product
      POSTGRES_USER: grpc-product
      POSTGRES_DB: grpc-product
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pd_isready -U grpc-product"]
      interval: 3s
      timeout: 5s
      retries: 5
    